<!doctype html>
<html lang="en">
    <head>
        <title>Travlog</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Discover the top destination of world"
        />
        <meta name="keywords" content="Travelog, Travel, Travel Planner" />
        <meta property="og:site_name" content="Travlog" />
        <link
            href="https://cdn.jsdelivr.net/npm/@vetixy/circular-std@1.0.0/dist/index.min.css"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://kit.fontawesome.com/5bb9b76cd3.js"
            crossorigin="anonymous"
        ></script>
        <link rel="stylesheet" href="src/styles/main.scss" />
    </head>
    <body>
        <nav class="navbar">
            <img
                src="./assets/logo.svg"
                alt="travlog logo"
                class="navbar__logo"
            />

            <div class="navbar__right">
                <ul class="navbar__links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Discover</a></li>
                    <li><a href="#">Special Deals</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>

                <div class="navbar__buttons">
                    <button class="primary-button navbar__buttons__login">
                        Log In
                    </button>
                    <button class="primary-button navbar__buttons__signup">
                        Sign Up
                    </button>
                </div>
            </div>

            <div class="navbar__hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>

        <section class="hero-section">
            <div class="blur-ellipse"></div>

            <div class="hero-section__images-container">
                <div class="background-image">
                    <img src="./assets/globe.png" alt="" />
                </div>

                <div class="hero-section__images">
                    <div class="hero-section__images-left">
                        <div class="hero-image">
                            <img src="./assets/ocean.jpg" alt="ocean view" />
                        </div>
                        <div class="hero-image">
                            <img
                                src="./assets/mountain.jpg"
                                alt="mountain view"
                            />
                        </div>
                        <div class="telegram-icon">
                            <i class="fa-solid fa-paper-plane"></i>
                        </div>

                        <div class="person-icon">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>

                        <div class="top-places-icon">
                            <div>
                                <i class="fa-solid fa-location-dot"></i>
                            </div>
                            <p>Top Places</p>
                        </div>
                    </div>

                    <div class="hero-section__images-right">
                        <div class="hero-image">
                            <img src="./assets/city.jpg" alt="city view" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="hero-section__text-container">
                <div class="heading">
                    <div class="explore-btn">
                        <p>Explore the world!</p>
                        <div class="briefcase-icon">
                            <i class="fa-solid fa-briefcase"></i>
                        </div>
                    </div>

                    <div class="main-heading">
                        <h1>
                            Travel <span>top destination</span> of the world
                        </h1>
                    </div>
                </div>

                <div class="hero-para">
                    <p>
                        We always make our customer happy by providing as many
                        choices as possible
                    </p>
                </div>

                <div class="cta-btn">
                    <button class="cta-btn-start">Get Started</button>
                    <button class="cta-btn-watch">
                        <div><i class="fa-solid fa-play"></i></div>
                        <p>Watch Demo</p>
                    </button>
                </div>

                <div class="triangles">
                    <img src="./assets/triangles.png" alt="triangles image" />
                </div>
            </div>
        </section>

        <section class="partner-list">
            <div>
                <img src="/assets/tripadvisor.png" alt="tripadvisor" />
            </div>
            <div>
                <img src="/assets/expedia.png" alt="expedia" />
            </div>
            <div>
                <img src="/assets/booking.png" alt="booking.com" />
            </div>
            <div>
                <img src="/assets/airbnb.png" alt="airbnb" />
            </div>
            <div>
                <img src="/assets/orbitz.png" alt="orbitz" />
            </div>
        </section>

        <script type="module" src="./src/script/index.js"></script>
    </body>
</html>
