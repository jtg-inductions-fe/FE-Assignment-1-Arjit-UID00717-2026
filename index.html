<!doctype html>
<html lang="en">
    <head>
        <title>Travlog</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Discover the top destination of world"
        />
        <meta name="keywords" content="Travlog, Travel, Travel Planner" />
        <meta property="og:site_name" content="Travlog" />
        <link
            href="https://cdn.jsdelivr.net/npm/@vetixy/circular-std@1.0.0/dist/index.min.css"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://kit.fontawesome.com/5bb9b76cd3.js"
            crossorigin="anonymous"
        ></script>
        <link rel="stylesheet" href="src/styles/main.scss" />
    </head>
    <body>

        <nav class="navbar">
            <img src="./assets/logo.svg" alt="travlog logo" class="navbar__logo">

            <div class="navbar__right">

                <ul class="navbar__links">
                    <li>Home</li>
                    <li>Discover</li>
                    <li>Special Deals</li>
                    <li>Contact</li>
                </ul>

                <div class="navbar__buttons">
                    <button class="primary-button navbar__buttons__login">Log In</button>
                    <button class="primary-button navbar__buttons__signup">Sign Up</button>
                </div>
                
            </div>

            <div class="navbar__hamburger">
                <i class="fa-solid fa-bars"></i>
            </div>

        </nav>
        
        <script type="module" src="./src/script/index.js"></script>
    </body>
</html>
