<!doctype html>
<html lang="en">
    <head>
        <title>Travlog</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Discover the top destination of world"
        />
        <meta name="keywords" content="Travlog, Travel, Travel Planner" />
        <meta property="og:site_name" content="Travlog" />
        <link
            href="https://cdn.jsdelivr.net/npm/@vetixy/circular-std@1.0.0/dist/index.min.css"
            rel="stylesheet"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://kit.fontawesome.com/5bb9b76cd3.js"
            crossorigin="anonymous"
        ></script>
        <link rel="stylesheet" href="src/styles/main.scss" />
    </head>
    <body>
        <nav class="navbar">
            <img
                src="./assets/logo.svg"
                alt="travlog logo"
                class="navbar__logo"
            />

            <div class="navbar__menu">
                <!-- TODO: handle accessibility and navigation to section on click    -->
                <ul class="navbar__links">
                    <li>
                        <a href="#" class="navbar__links-item link link--sm"
                            >Home</a
                        >
                    </li>
                    <li>
                        <a href="#" class="navbar__links-item link link--sm"
                            >Discover</a
                        >
                    </li>
                    <li>
                        <a href="#" class="navbar__links-item link link--sm"
                            >Special Deals</a
                        >
                    </li>
                    <li>
                        <a href="#" class="navbar__links-item link link--sm"
                            >Contact</a
                        >
                    </li>
                </ul>

                <div class="navbar__buttons">
                    <button class="button button--text">Log In</button>
                    <button class="button button--primary">Sign Up</button>
                </div>
            </div>

            <button
                class="navbar__hamburger"
                aria-expanded="false"
                aria-controls="main-menu"
                aria-label="Menu"
            >
                <i class="fa-solid fa-bars" aria-label="hamburger menu"></i>
            </button>
        </nav>

        <section class="hero">
            <!-- Visual background effects -->
            <div class="hero__blur-ellipse"></div>

            <!-- Media/Images Wrapper -->
            <div class="hero__gallery">
                <div class="hero__bg-globe">
                    <img src="./assets/globe.png" alt="globe image" />
                </div>

                <div class="hero__showcase">
                    <div class="hero__column hero__column-left">
                        <div class="hero__image-wrapper">
                            <img src="./assets/ocean.jpg" alt="ocean view" />
                        </div>
                        <div class="hero__image-wrapper">
                            <img
                                src="./assets/mountain.jpg"
                                alt="mountain view"
                            />
                        </div>

                        <!-- Floating badges/icons -->
                        <div class="hero__icon-badge hero__icon-badge-telegram">
                            <i class="fa-solid fa-paper-plane"></i>
                        </div>

                        <div class="hero__icon-badge hero__icon-badge-add-user">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>

                        <div class="hero__location-badge">
                            <div class="hero__location-icon">
                                <i class="fa-solid fa-location-dot"></i>
                            </div>
                            <p class="hero__location-text">Top Places</p>
                        </div>
                    </div>

                    <div class="hero__column hero__column-right">
                        <div class="hero__image-wrapper">
                            <img src="./assets/city.jpg" alt="city view" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Content/Text Wrapper -->
            <div class="hero__content">
                <div class="hero__header">
                    <div class="hero__badge">
                        <p class="hero__badge-text">Explore the world!</p>
                        <div class="hero__badge-icon">
                            <i class="fa-solid fa-briefcase"></i>
                        </div>
                    </div>

                    <h1 class="hero__title">
                        Travel
                        <span class="hero__title-highlight"
                            >top destination</span
                        >
                        of the world
                    </h1>
                </div>

                <p class="hero__description">
                    We always make our customer happy by providing as many
                    choices as possible
                </p>

                <div class="hero__actions">
                    <button class="hero__btn button button--primary">
                        Get Started
                    </button>
                    <button
                        class="hero__btn button hero__btn-watch button--text button--outlined"
                    >
                        <span class="hero__btn-icon"
                            ><i class="fa-solid fa-play"></i
                        ></span>
                        <span class="hero__btn-text">Watch Demo</span>
                    </button>
                </div>

                <div class="hero__decorative-triangles">
                    <img src="./assets/triangles.png" alt="triangles image" />
                </div>
            </div>
        </section>

        <section class="partner-list">
            <div class="partner-list__item">
                <img
                    class="partner-list__logo"
                    src="/assets/tripadvisor.png"
                    alt="tripadvisor"
                />
            </div>
            <div class="partner-list__item">
                <img
                    class="partner-list__logo"
                    src="/assets/expedia.png"
                    alt="expedia"
                />
            </div>
            <div class="partner-list__item">
                <img
                    class="partner-list__logo"
                    src="/assets/booking.png"
                    alt="booking.com"
                />
            </div>
            <div class="partner-list__item">
                <img
                    class="partner-list__logo"
                    src="/assets/airbnb.png"
                    alt="airbnb"
                />
            </div>
            <div class="partner-list__item">
                <img
                    class="partner-list__logo"
                    src="/assets/orbitz.png"
                    alt="orbitz"
                />
            </div>
        </section>

        <script type="module" src="./src/script/index.js"></script>
    </body>
</html>
